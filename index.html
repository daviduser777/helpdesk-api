<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - Crear Ticket</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Help Desk</h1>
            <p>Sistema de Gestión de Incidencias</p>
        </div>
        
        <div class="nav">
            <a href="/" class="active">📝 Crear Ticket</a>
            <a href="/admin.html">🔒 Panel de Agentes</a>
            <a href="/dashboard.html">📊 Dashboard</a>
        </div>
        
        <div class="content">
            <h2>Crear Nuevo Ticket</h2>
            <p>Complete el formulario para reportar un problema.</p>
            
            <div id="alert" style="display: none;"></div>
            
            <form id="ticketForm">
                <div class="form-group">
                    <label>Título *</label>
                    <input type="text" id="titulo" required placeholder="Ej: Problema con la impresora">
                </div>
                
                <div class="form-group">
                    <label>Descripción *</label>
                    <textarea id="descripcion" required placeholder="Describa el problema en detalle..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Prioridad</label>
                    <select id="prioridad">
                        <option value="normal">🟢 Normal</option>
                        <option value="alta">🟠 Alta</option>
                        <option value="urgente">🔴 Urgente</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="su@email.com">
                </div>
                
                <button type="submit">🚀 Enviar Ticket</button>
            </form>
            
            <div id="trelloInfo" style="margin-top: 20px; display: none;" class="alert alert-success"></div>
        </div>
    </div>
    
    <script src="/script.js"></script>
</body>
</html>
